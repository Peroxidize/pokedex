<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Pokedex</title>
        <!-- Tailwind CDN -->
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="max-w-screen-lg m-auto p-8 font-mono">
        <!-- reusable template for pokemon cards -->
        <template id="pokemon-card">
            <div
                class="border-blue-400 border-[1px] p-4 rounded-lg hover:cursor-pointer hover:scale-105 transition-all"
            >
                <div class="relative">
                    <span
                        class="absolute top-0 left-0 px-2 py-1 text-sm text-white bg-blue-500 rounded-br-lg"
                    >
                        #001
                    </span>
                </div>
                <div class="flex flex-col items-center justify-center p-4">
                    <div class="w-24 h-24 mb-4 bg-blue-100 rounded-full">
                        <img
                            src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png"
                            alt="Bulbasaur"
                            className="w-full h-full object-contain"
                        />
                    </div>
                    <h2 class="capitalize text-xl font-bold text-center text-gray-800">
                        Bulbasaur
                    </h2>
                </div>
            </div>
        </template>

        <header><h1 class="text-bold text-3xl text-center mt-4 mb-8">Pokedex</h1></header>
        <main>
            <nav class="flex flex-wrap justify-between gap-4 mb-8">
                <!-- Search bar for pokemon search -->
                <div class="relative mt-2 rounded-md shadow-sm max-w-[256px]">
                    <div
                        class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3"
                    >
                        <span class="text-gray-500 sm:text-sm">&#x1F50E;</span>
                    </div>
                    <input
                        id="search"
                        type="text"
                        class="block w-full rounded-md border-0 py-1.5 pl-8 pr-20 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm/6"
                        placeholder="Charizard"
                    />
                </div>
                
                <!-- Pokemon sorting buttons -->
                <div class="flex gap-4 items-center">
                    <p>Sort by:</p>
                    <button
                        id="sort-id"
                        class="bg-blue-500 font-semibold text-white py-2 px-4 border border-transparent rounded"
                    >
                        ID
                    </button>
                    <button
                        id="sort-name"
                        class="bg-transparent hover:bg-blue-500 text-blue-700 font-semibold hover:text-white py-2 px-4 border border-blue-500 hover:border-transparent rounded"
                    >
                        Name
                    </button>
                    <button
                        id="sort-reverse"
                        class="bg-transparent hover:bg-blue-500 text-blue-700 font-semibold hover:text-white py-2 px-4 border border-blue-500 hover:border-transparent rounded"
                    >
                        Reverse
                    </button>
                </div>
            </nav>
            
            <!-- pokemon card container append child elements to this element -->
            <section
                id="card-container"
                class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"
            ></section>
        </main>

        <!-- Change page section -->
        <footer class="flex justify-between items-center mt-8">
            <button
                id="previous-button"
                class="bg-transparent hover:bg-blue-500 text-blue-700 font-semibold hover:text-white py-2 px-4 border border-blue-500 hover:border-transparent rounded"
            >
                Previous
            </button>
            <h3 id="page-info" class="text-lg"></h3>
            <button
                id="next-button"
                class="bg-transparent hover:bg-blue-500 text-blue-700 font-semibold hover:text-white py-2 px-4 border border-blue-500 hover:border-transparent rounded"
            >
                Next
            </button>
        </footer>
        
        <!-- this javascript file will be responsible for interactivity of the page -->
        <script src="./js/index.js"></script>
    </body>
</html>
